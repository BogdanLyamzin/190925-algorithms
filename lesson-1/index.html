      const salaries = [3000, 2500, 4000, 5000, 2100, 7800, 3700];
      //    console.log([...salaries].sort())
      //     console.log(salaries);
      const tempSalaries = [...salaries];
      const sortedSalaries = [];
      while(tempSalaries.length) {
        const minSalary = Math.min(...tempSalaries);
        const index = tempSalaries.indexOf(minSalary);
        tempSalaries.splice(index, 1);
        sortedSalaries.push(minSalary);
      }
      console.log(sortedSalaries);
    </script>
