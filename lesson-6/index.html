    <script>
      const partition = (arr, low, high) => {
        const pivot = arr[high]; // 3

        let i = low - 1; // -1
        for (let j = low; j < high; j += 1) {
          // j = 1
          if (arr[j] <= pivot) {
            i += 1; // 0
            const temp = arr[i]; // temp = arr[0] = 7
            arr[i] = arr[j]; // arr[0] = 2;
            arr[j] = temp; // arr[1] = 7;
            // [2, 7, 9, 4, 3]
          }
        }
        //[2, 7, 9, 4, 3]
        const temp = arr[i + 1]; // temp = arr[0 + 1] = 7
        arr[i + 1] = arr[high]; // arr[0 + 1] = arr[4] = 3;
        // [2, 3, 9, 4, 3]
        arr[high] = temp; // arr[4] = 7;
        // [2, 3, 9, 4, 7]
        return i + 1;
      };

      const quickSort = (arr, low = 0, high = arr.length - 1) => {
        if (low < high) {
          const idx = partition(arr, low, high); // 1
          quickSort(arr, low, idx - 1); // arr, 0, 0
          quickSort(arr, idx + 1, high); // arr, 2, 4 [9, 4, 7]
        }
        return arr;
      };

      const numbers = [7, 2, 9, 4, 3];
      quickSort(numbers, 0, numbers.length - 1);
      console.log(numbers);

      /*
      Средняя сложность быстрой сортировки: O(n log n)
      Средняя сложность сортировки слиянием: O(n log n)
      Худшая сложность быстрой сортировки: O(n^2) - если попался неудачный опорный элемент
      Худшая сложность сортировки слиянием: O(n log n)
      Объем выделяемой памяти для быстрой сортировки: O(log n)
      Объем выделяемой памяти для сортировки слиянием: O(n)
      */
